name: CrisisMapAI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: postgresql://crisismap:crisismap@127.0.0.1:5432/crisismap
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      DEBUG: "true"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: crisismap
          POSTGRES_PASSWORD: crisismap
          POSTGRES_DB: crisismap
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r CrisisMapAI/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd CrisisMapAI/frontend
          npm ci

      - name: Run backend tests
        run: |
          pytest CrisisMapAI/backend/tests

      - name: Run frontend build
        run: |
          cd CrisisMapAI/frontend
          npm run build
